<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Horizon Hotel</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">Grand Horizon</div>
    <div class="nav-links">
        <a href="#home">Home</a>
        <a href="#contact">Contact</a>
        <a href="#about">About</a>
    </div>
</nav>

<!-- HERO -->
<section id="home" class="hero">
    <div class="hero-content">
        <h1>Grand Horizon Hotel</h1>
        <p>Luxury • Comfort • Experience</p>
    </div>
</section>

<section id="contact" class="section">Contact Us</section>
<section id="about" class="section">About Our Hotel</section>

<!-- CHATBOT -->
<div class="chatbot-widget">
    <div class="chat-header">
        <span>Hotel Assistant</span>
    </div>

    <div class="chat-body" id="chat"></div>

    <div class="chat-input">
        <input type="text" id="input" placeholder="Ask about rooms, booking..." onkeypress="handleKey(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
